apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clawless
resources:
  - namespace.yaml
  - pvc.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml

# MicroK8s: override the default StorageClass to microk8s-hostpath
patches:
  - target:
      kind: PersistentVolumeClaim
      name: clawless-home
    patch: |
      - op: add
        path: /spec/storageClassName
        value: microk8s-hostpath
