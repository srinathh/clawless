apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clawless
images:
  - name: ghcr.io/srinathh/clawless
    newTag: latest

resources:
  - namespace.yaml
  - pvc.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml

# Uncomment to override the default port (18265):
# patches:
#   - target:
#       kind: Deployment
#       name: clawless
#     patch: |
#       - op: replace
#         path: /spec/template/spec/containers/0/ports/0/containerPort
#         value: 9090
#       - op: replace
#         path: /spec/template/spec/containers/0/env/0/value
#         value: "9090"
#   - target:
#       kind: Service
#       name: clawless
#     patch: |
#       - op: replace
#         path: /spec/ports/0/port
#         value: 9090

# MicroK8s: override the default StorageClass to microk8s-hostpath
patches:
  - target:
      kind: PersistentVolumeClaim
      name: clawless-home
    patch: |
      - op: add
        path: /spec/storageClassName
        value: microk8s-hostpath
