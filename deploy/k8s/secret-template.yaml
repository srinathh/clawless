# Copy this file to secret.yaml and fill in real values.
# secret.yaml is gitignored and must never be committed.
#
#   cp secret-template.yaml secret.yaml
#   $EDITOR secret.yaml
#   kubectl apply -k .
apiVersion: v1
kind: Secret
metadata:
  name: clawless-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  # Twilio WhatsApp — uncomment and fill in to enable the channel.
  # All fields below are sensitive and must not go in clawless.toml.
  # CHANNELS__TWILIO_WHATSAPP__ACCOUNT_SID: "AC..."
  # CHANNELS__TWILIO_WHATSAPP__AUTH_TOKEN: ""
  # CHANNELS__TWILIO_WHATSAPP__WHATSAPP_FROM: "whatsapp:+14155238886"
  # CHANNELS__TWILIO_WHATSAPP__PUBLIC_URL: "https://example.com"
  # CHANNELS__TWILIO_WHATSAPP__ALLOWED_SENDERS: '["whatsapp:+1234567890"]'
