services:
  agent:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Config file (ro)
      - ./config.toml:/home/appuser/config.toml:ro

      # Workspace (rw) — agent's working directory
      - ${WORKSPACE_DIR:-./data/workspace}:/home/appuser/workspace:rw

      # User Claude dir (rw) — SDK state, sessions
      - ${USER_CLAUDE_DIR:-./data/user-claude}:/home/appuser/.claude:rw

      # Plugins (ro) — each subdirectory is a plugin with .claude-plugin/plugin.json
      - ${PLUGINS_DIR:-./plugins}:/home/appuser/plugins:ro

      # Optional: CLI credentials (ro overlay on rw parent)
      # Uncomment if using subscription auth instead of API key
      # - ~/.claude/.credentials.json:/home/appuser/.claude/.credentials.json:ro

    environment:
      # Secrets — set these in your host environment or CI pipeline
      - CLAUDE__API_KEY=${CLAUDE_API_KEY:-}
      - CHANNELS__TWILIO_WHATSAPP__AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}

    restart: unless-stopped
