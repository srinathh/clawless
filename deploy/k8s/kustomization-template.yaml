apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clawless
images:
  - name: ghcr.io/srinathh/clawless
    newTag: latest

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml

# Override the hostPath to match your host directory.
# Run clawless-init on the host first, or let the init container create it.
patches:
  - target:
      kind: Deployment
      name: clawless
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0/hostPath/path
        value: /path/to/your/clawless_home

