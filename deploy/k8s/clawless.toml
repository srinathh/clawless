# Clawless configuration — edit before deploying.
# Sensitive values (API keys, tokens) go in secret.yaml as env vars,
# NOT here. Env vars take precedence over this file.

[claude]
max_turns = 30
max_budget_usd = 1.0
max_concurrent_requests = 3

