# Clawless configuration — edit before deploying.
# Sensitive values (API keys, tokens) go in secret.yaml as env vars,
# NOT here. Env vars take precedence over this file.

[claude]
max_turns = 30
max_budget_usd = 1.0
max_concurrent_requests = 3

# Channels — only configured channels get instantiated.
# Remove or comment out a section to disable that channel.
#
# IMPORTANT: Most channel fields are sensitive and belong in secret.yaml
# as env vars (e.g. CHANNELS__TWILIO_WHATSAPP__ACCOUNT_SID).
# Only non-sensitive fields should go here.

# [channels.twilio_whatsapp]
# ack_message = "Thinking..."

# [channels.test]
# sender = "test:user1"
# messages = ["Hello", "What is 2+2?"]
