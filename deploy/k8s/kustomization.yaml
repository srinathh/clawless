apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clawless
resources:
  - namespace.yaml
  - pvc.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
configMapGenerator:
  - name: clawless-config
    files:
      - clawless.toml
    options:
      disableNameSuffixHash: true
